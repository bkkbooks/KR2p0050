body:
  text: 魯莊公將爲大鐘型既成矣曹沫入見曰昔周室之封魯東西七百南北五百非匪山非匪澤無有不民今邦彌小而鐘愈大君其圖之昔堯之饗舜也飯於土簋欲飲於土鉶而撫有天下此不貧於美而富於德歟昔周室境必勝可以有治邦周志是存莊公曰今天下之君子既可知已孰能并兼人哉曹沫曰君其毋愪臣聞之曰鄰邦之君明則不可以不修政而善於民不然恐亡焉鄰邦之君無道則亦不可以不修政而善於民不然無以取之莊公曰昔施伯語寡人曰君子得之失之天命今異於爾言曹沫曰無以異於臣之言君弗盡臣聞之曰君子以賢稱而失之天命以亡道稱而沒身就世亦天命不然君子以賢稱曷有弗得以無道稱曷有弗失莊公曰慢哉吾聞此言乃命毀鐘型而聽邦政不晝寢不飲酒不聽樂居不褻文食不貳菜兼愛萬民而無有私也還年而問於曹沫曰吾欲與齊戰問陣奚如守邊城奚如曹沫答曰臣聞之有固謀而無固城有克政而無克陣三代之陣皆存或以克或以亡且臣聞之小邦處大邦之間敵邦交地不可以先作怨疆地毋先而必取焉所以距邊毋愛貨資子女以事其便嬖所以距內城郭必修繕甲利兵必有戰心以守所以爲長也且臣之聞之不和於邦不可以出豫不和於豫不可以出陣不和於陣不可以戰是故夫陣者三教之末君必不已則由其本乎莊公曰爲和於邦如之何曹沫答曰毋獲民時毋奪民利陳功而食刑罰有罪而賞爵有德莊公曰爲和於豫如何曹沫曰三軍出君自率必有二將軍每將軍必有數嬖大夫每嬖大夫必有數大官之師公孫公子凡有司率長期會之不難所以爲和於豫莊公又問爲和於陣如何答曰車間容伍伍間容兵貴位重食使爲前行三行之後後見短兵什伍之間必有公孫公子是謂軍紀五人以伍一人有多四人皆賞所以爲斷毋尚獲而尚聞命所以爲毋退率車以車率徒以徒所以同死有戒言曰奔尔定訌不奔而或興或康以會故帥不使奔奔則不行戰有顯道勿兵以克莊公曰勿兵以克奚如答曰人之兵不砥礪兵必砥礪人之甲不堅我甲必堅人使士我使大夫人使大夫我使將軍人使將軍我君身進此戰之顯道莊公曰既成教矣出師有機乎答曰有臣聞之三軍出其將卑父兄不薦由邦御之此出師之機莊公又問曰三軍散裹有機乎答曰有臣聞之三軍未成陣未豫行阪濟障此散裹之機莊公又問曰戰有機乎答曰有其去之不速其就之不傅其啓節不疾此戰之機是故疑陣敗疑戰死莊公又問曰既戰有機乎答曰有其賞鮮且不中其誅重且不察死者弗收傷者弗問既戰而有怠心此既戰之機莊公又問曰復敗戰有道乎答曰有三軍大敗死者收之傷者問之善於死者爲生者君乃自過以悅於萬民弗狎危地毋火食毋誅而賞毋罪百姓而改其將君如親率必聚群有司而告之二三子勉之過不在子在寡人吾戰適不順於天命反師將復戰必召邦之貴人及邦之奇士御卒使兵毋復前常凡貴人使處前位一行後則見亡進則祿爵有常機莫之當莊公又問曰復盤戰有道乎答曰有既戰復舍號令於軍中曰繕甲利兵明日將戰廝徒煬以盤就行失車甲命之毋行明日將戰使爲前行諜人來告曰其將帥盡傷車輦皆栽木曰將早行乃命白徒早食輂兵各載尔藏既戰將量爲之毋怠毋使民疑及尔龜筮皆曰勝之改冒尔鼓乃秩其備明日復陣必過其所此復盤戰之道莊公又問曰復甘戰有道乎答曰有必慎以戒如將弗克毋冒以陷必過前攻賞獲飭葸以勸其志勇者喜之惶者悔之萬民貢首皆欲克之此復甘戰之道莊公又問曰復苦戰有道乎答曰有收而聚之束而厚之重賞薄刑使忘其死而獻其生使良車良士往取餌使其志起勇者使喜葸者使悔然後改始此復苦戰之道莊公又問曰善攻者奚如答曰民有寶曰城曰固曰阻三者盡用不棄邦家以宏善攻者必以其所有以攻人之所亡有莊公曰善守者奚如答曰其食足以食之其兵足以利之其城固足以捍之上下和且篤繲絓紀於大國大國親之天下不勝卒欲少以多少則易察迄成則易治果勝矣親率勝使人不親則不敦不和則不篤不義則不服莊公曰爲親如何答曰君毋憚自勞以觀上下之情僞匹夫寡婦之獄訟君必身聽之有知不足無所不中則民親之莊公又問爲和如何答曰毋嬖於便嬖毋長於父兄賞均聽中則民和之莊公又問爲義如何答曰陳功尚賢能治百人使長百人能治三軍使帥授有智予有能則民義之且臣聞之卒有長三軍有率帥邦有君此三者所以戰是故長民者毋攝爵毋御軍毋避罪用都教於邦於民莊公曰此三者足以戰乎答曰戒勝不可不慎不卒不恒不和則不篤不謙畏其志者寡矣莊公又問曰吾有所聞之一出言三軍皆勸一出言三軍皆往有之乎答曰有盟衁鬼神忽武非所以教民君其知之此先王之至道莊公曰沫吾言寔不而毋惑諸小道歟吾一欲聞三代之所曹沫答曰臣聞之昔之明王之起於天下者各以其世以及其身今與古亦間不同矣臣是故不敢以古答然而古亦有大道焉必恭儉以得之而驕泰以失之君其亦唯聞夫禹湯桀纣矣
